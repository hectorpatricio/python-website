{% extends "layout.html"%}

{% block content %}


<div class="container mt-2">
    <div class="accordion" id="miAccordion">
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#contenido" aria-expanded="true">
                    Sistema de Gestión de Tareas
                </button>
            </h2>

            <div id="contenido" class="accordion-collapse collapse show" data-bs-parent="#miAccordion">
                <div class="accordion-body">

                    <div class="form-tarea d-flex gap-2 mb-3">
                        <form action="{{ url_for('agregar') }}" method="POST" class="d-flex w-100 gap-2">
                            <input type="text" name="tarea" class="form-control" placeholder="Nueva tarea..." required>
                            <button class="btn btn-primary">Agregar</button>
                        </form>
                    </div>

                    <div class="lista">
                        {% for tarea in tareas %}
                            <div class="d-flex justify-content-between align-items-center mb-2 p-2 border rounded">
                                <span>{{ loop.index }} {{ tarea }}</span>
                                <form action="{{ url_for('eliminar', indice=loop.index0) }}" method="POST">
                                    <button class="btn btn-sm btn-danger btn-sm">
                                        Eliminar
                                    </button>
                                </form>
                            </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


{% endblock %}
